name: 🚸 pre-commit
description: Check the code with pre-commit hooks

inputs:
  config:
    description: pre-commit config file path
    required: false
    default: .pre-commit-config.yaml
  token:
    description: GitHub token
    required: false

runs:
  using: composite

  steps:
    - name: 🚚 Check out repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: ⚡ Install prek
      run: curl -L "https://github.com/j178/prek/releases/download/$PREK_VERSION/prek-installer.sh" | sh
      shell: bash
      env:
        PREK_VERSION: v0.3.8

    - name: 🐹 Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: 1.26.1

    - name: "#️⃣ Download pre-commit hooks"
      id: hooks
      if: ${{ inputs.config == '.pre-commit-config.yaml' && hashFiles(inputs.config) == '' }}
      run: |
        curl -O "https://raw.githubusercontent.com/$ACTION_REPOSITORY/$ACTION_REF/.pre-commit-config.yaml"
        echo 'downloaded=true' | tee -a "$GITHUB_OUTPUT"
      shell: bash
      env:
        ACTION_REPOSITORY: ${{ github.action_repository }}
        ACTION_REF: ${{ github.action_ref }}

    - name: 🫙 Cache pre-commit dependencies
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.cache/prek
        key: pre-commit-${{ runner.os }}-${{ hashFiles(inputs.config) }}
        restore-keys: pre-commit-${{ runner.os }}-

    - name: ⚡ Run prek
      run: prek run -ac="$PREK_CONFIG"
      shell: bash
      env:
        PREK_CONFIG: ${{ inputs.config }}
        GH_TOKEN: ${{ inputs.token }}
        GITHUB_TOKEN: ${{ inputs.token }}

    - name: 🧹 Clean up unused hooks
      if: ${{ !cancelled() }}
      run: prek cache gc
      shell: bash

    - name: 🗑️ Remove downloaded hooks
      if: ${{ !cancelled() && steps.hooks.outputs.downloaded == 'true' }}
      run: rm "$PREK_CONFIG"
      shell: bash
      env:
        PREK_CONFIG: ${{ inputs.config }}

    - name: 🚸 Run pre-commit-ci-lite
      if: ${{ !cancelled() }}
      uses: pre-commit-ci/lite-action@5d6cc0eb514c891a40562a58a8e71576c5c7fb43 # v1.1.0
      with:
        msg: "chore(fix): Auto fixes by pre-commit hooks"
