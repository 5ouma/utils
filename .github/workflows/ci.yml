name: 🎽 CI

on:
  push:
    branches:
      - main
    paths:
      - pre-commit/hooks/*
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - pre-commit/hooks/*
      - .github/workflows/ci.yml

permissions: {}

jobs:
  detect:
    name: 🔄 Detect Changed Projects
    runs-on: Ubuntu-Slim
    timeout-minutes: 1
    outputs:
      hooks: ${{ steps.filter.outputs.hooks }}
      ci: ${{ steps.filter.outputs.ci }}

    steps:
      - name: 🚚 Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔄 Filter changed files
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            hooks:
              - added|modified: ["pre-commit/hooks/*"]
            ci: [".github/workflows/ci.yml"]

  lint-check:
    name: 🧹 Lint Check
    needs: detect
    if: ${{ needs.detect.outputs.hooks || needs.detect.outputs.ci }}
    runs-on: Ubuntu-Slim
    defaults:
      run:
        working-directory: pre-commit/hooks
    timeout-minutes: 1

    steps:
      - name: 🚚 Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🦕 Set up Deno
        id: setup-deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          cache: true

      - name: 📦 Install dependencies
        if: ${{ steps.setup-deno.outputs.cache-hit != 'true' }}
        run: deno install --frozen

      - name: 🧹 Lint check
        run: deno lint

  format-check:
    name: 📝 Format Check
    needs: detect
    if: ${{ needs.detect.outputs.hooks || needs.detect.outputs.ci }}
    runs-on: Ubuntu-Slim
    defaults:
      run:
        working-directory: pre-commit/hooks
    timeout-minutes: 1

    steps:
      - name: 🚚 Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🦕 Set up Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4

      - name: 📝 Format check
        run: deno fmt --check

  type-check:
    name: 🔍 Type Check
    needs: detect
    if: ${{ needs.detect.outputs.hooks || needs.detect.outputs.ci }}
    runs-on: Ubuntu-Slim
    defaults:
      run:
        working-directory: pre-commit/hooks
    timeout-minutes: 1

    steps:
      - name: 🚚 Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🦕 Set up Deno
        id: setup-deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          cache: true

      - name: 📦 Install dependencies
        if: ${{ steps.setup-deno.outputs.cache-hit != 'true' }}
        run: deno install --frozen

      - name: 🔍 Type check
        run: deno check --doc
